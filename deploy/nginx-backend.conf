# Nginx config for the Orderbook AI Desk backend API
# Place at: /etc/nginx/sites-available/orderbook-api
# Then: sudo ln -s /etc/nginx/sites-available/orderbook-api /etc/nginx/sites-enabled/
#
# Replace YOUR_BACKEND_DOMAIN with your actual domain, e.g. api.orderbook.in
# After adding the domain, run: sudo certbot --nginx -d YOUR_BACKEND_DOMAIN

server {
    listen 80;
    server_name YOUR_BACKEND_DOMAIN;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Proxy to uvicorn
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 20M;
    }

    # Health check — no auth needed
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        access_log off;
    }
}
